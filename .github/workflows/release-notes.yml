name: Auto Release Notes

on:
  pull_request:
    types: [closed]

jobs:
  release-notes:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install axios

      - name: Generate Release Notes
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_DATA: ${{ toJson(github.event.pull_request) }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          node <<'EOF'
          const axios = require("axios");

          // ✅ Safe PR parsing
          const prRaw = JSON.parse(process.env.PR_DATA);

          const pr = {
            title: prRaw.title,
            body: prRaw.body || "N/A",
            diff_url: prRaw.diff_url,
            html_url: prRaw.html_url
          };

          const owner = process.env.REPO_OWNER;
          const repo = process.env.REPO_NAME;

          async function run() {
            console.log("Processing PR:", pr.title);

            // 1️⃣ Fetch diff
            const diffRes = await axios.get(pr.diff_url, {
              headers: {
                Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                Accept: "application/vnd.github.v3.diff"
              }
            });

            const diff = diffRes.data.slice(0, 6000);

            // 2️⃣ AI Summary
            const prompt = `
            You are a senior engineer generating release notes.
            
            Return STRICT JSON:
            {
              "type": "Feature | Bug Fix | Refactor | Improvement",
              "summary": "short user-facing summary"
            }
            
            PR Title: ${pr.title}
            Description: ${pr.body}
            Code:
            ${diff}
            `;

            const aiRes = await axios.post(
              "https://openrouter.ai/api/v1/chat/completions",
              {
                model: "mistralai/mistral-7b-instruct",
                messages: [{ role: "user", content: prompt }]
              },
              {
                headers: {
                  Authorization: `Bearer ${process.env.OPENROUTER_API_KEY}`
                }
              }
            );

            let result;
            try {
              result = JSON.parse(aiRes.data.choices[0].message.content);
            } catch {
              result = {
                type: "Improvement",
                summary: pr.title
              };
            }

            const line = `- ${result.summary} ([PR](${pr.html_url}))`;

            // 3️⃣ Get or create release
            const tag = "latest";
            const releaseName = "Latest Updates";

            let release;

            try {
              const res = await axios.get(
                `https://api.github.com/repos/${owner}/${repo}/releases/tags/${tag}`,
                {
                  headers: {
                    Authorization: `Bearer ${process.env.GITHUB_TOKEN}`
                  }
                }
              );
              release = res.data;
            } catch {
              const res = await axios.post(
                `https://api.github.com/repos/${owner}/${repo}/releases`,
                {
                  tag_name: tag,
                  name: releaseName,
                  body: "## 🚀 Release Notes\n",
                  draft: false,
                  prerelease: false
                },
                {
                  headers: {
                    Authorization: `Bearer ${process.env.GITHUB_TOKEN}`
                  }
                }
              );
              release = res.data;
            }

            // 4️⃣ Append safely
            const updatedBody = `${release.body || ""}\n${line}`;

            await axios.patch(
              `https://api.github.com/repos/${owner}/${repo}/releases/${release.id}`,
              {
                body: updatedBody
              },
              {
                headers: {
                  Authorization: `Bearer ${process.env.GITHUB_TOKEN}`
                }
              }
            );

            console.log("✅ Release notes updated");
          }

          run();
          EOF
